services:
  mariadb:
    container_name: db
    image: mariadb
    environment:
        MYSQL_ROOT_PASSWORD: "testdbpwd"
    volumes: 
          - ./mariadbData:/var/lib/mysql/
    ports:
        - "3307:3306"
  calrouter:
    container_name: cal_router
    build:
      context: .
      target: router
    command: "/app/router/server"
    ports:
      - "8080:8080"
    env_file: .env
  calorietracker:
    build: .
networks:
  default:
    name: N_calorieTracker